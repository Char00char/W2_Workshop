
<style>
#erd2 svg { width: 100%; }
</style>
<div id="erd2" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg2', `erDiagram
  CUSTOMERS ||--o{ PETS : owns
  CUSTOMERS ||--o{ PAYMENTS : makes
  PETS ||--o{ WALKS : scheduled_for
  WALKERS ||--o{ WALKS : assigned_to
  WALKS ||--o| PAYMENTS : linked_to

  CUSTOMERS {
    int customer_id PK
    string first_name
    string last_name
    string phone
    string email
    string address
    string city
    string state
    string zip
    string emergency_contact
  }
  PETS {
    int pet_id PK
    int customer_id FK
    string dog_name
    string breed
    date date_of_birth
    string size
    string notes
  }
  WALKS {
    int walk_id PK
    int pet_id FK
    int walker_id FK
    date scheduled_date
    time scheduled_time
    int duration_minutes
    string status
    string notes
  }
  PAYMENTS {
    int payment_id PK
    int walk_id FK
    decimal amount
    date payment_date
    string payment_method
    string payment_status
  }
  WALKERS {
    int walker_id PK
    string first_name
    string last_name
    string email
    string phone
    string role
    date hire_date
  }
`);
document.getElementById('erd2').innerHTML = svg;

document.querySelectorAll('#erd2 svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd2 svg .row-rect-odd path, #erd2 svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
